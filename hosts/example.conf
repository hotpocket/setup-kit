# setup-kit per-host answer file — copy to hosts/$(hostname).conf
# Records every choice so re-runs are non-interactive and idempotent.
# Flip any 'no' to 'yes' later and re-run: ./bootstrap.sh workstation install

## apt groups — DEFAULT = development on a VM + graphics/browsers (needed
## for remote-in sessions and headless chrome testing). Media/wine/games
## are opt-in via the selection menu at first interactive install.
group_cli_system=yes          # base OS glue — snap, themes, fonts, pdf/doc viewers, memtest
group_desktop=yes             # GNOME so the box is usable as a (remote-able) desktop
group_apps=yes                # web browsers + Google Drive mount
group_editors=yes             # code + office editing — vscode, vim/neovim, libreoffice
group_media=no                # play/edit audio/video/graphics + codecs
group_network=yes             # remote-in & net work — ssh server, samba, wireshark/nmap, transmission
group_games=no                # steam + games (off: most targets headless/no dGPU)
group_wine=no                 # Wine for Windows apps (e.g. MTGA — see component_mtga)
group_dev_core=yes            # C/C++ chain, git/gh/jq, docker, sqlite
group_dev_java=yes            # current JDK + maven
group_dev_python=yes          # pyenv build deps + pip/pipx (interpreters: lang_python)
group_dev_cloud=yes           # cloud CLIs — aws, gcloud
group_dev_flutter_deps=yes    # flutter Linux-desktop build deps + adb udev rules
## optional (OFF by default)
group_dev_db=no               # run a local DB to develop against — MariaDB + PostgreSQL
group_dev_php=no              # PHP runtime for web dev
group_dev_rust=no             # apt rust (stale — prefer rustup; listed for completeness)
group_dev_go=no               # Go — golang-go + gopls/staticcheck
group_dev_r=no                # R — r-base (rstudio dropped; confirm before enabling)
group_printing=no             # CUPS + printer GUI (dev VMs/headless don't need it)

## conditional groups resolve by detection; override only to force
# cond_nvidia=auto            # auto: NVIDIA GPU present AND ubuntu-drivers backs it (legacy cards → nouveau); yes forces, no blocks
# cond_virtualbox=auto        # bare-metal non-proxmox only

## verify.sh "system calm" thresholds (post-install behavior checks)
# calm_journal_warns=50       # max journal warnings+errors per 5 min
# calm_load_per_core=50       # max idle load1 per core, ×100 (50 = 0.5/core)
# calm_fork_rate=20           # max process spawns/sec (catches respawn loops)

## size review: packages above this prompt at first install
review_over_mb=100

## components
component_oom_zram=yes        # stop memory spikes killing the GNOME session — zram swap + oomd tuning (components/oom-zram.md)
swap_policy=auto              # auto: <16G RAM → zram + 4G disk overflow (pri -2); ≥16G → zram-only. Or: zram-only | zram+disk
component_herdr=no            # terminal multiplexer for running multiple AI coding agents at once (components/herdr.md)
component_ollama=no           # opt-in   local LLM, pulls the `wat` model (components/ollama.md)
#ollama_model=qwen3-coder:30b  # model `wat` runs (~18 GB); must match alias in .configs/.bash_aliases
component_claude_skills=yes   # clone+link Claude skills (components/{gstack,vault,conduct}.md)
claude_skills="gstack vault conduct"  # which skills phase 08 installs

## language stacks (manifests/lang/)
lang_python=yes              # pyenv + Python interpreters (build deps: group_dev_python)
lang_node=yes                # Node.js via nvm + npm
lang_flutter=yes              # includes Android Studio + emulator (needs /dev/kvm)

## dotfiles
configs_repo=git@github.com:hotpocket/.configs.git
configs_run_setup=yes
group_extras=no               # niche/occasional tools (or install piecemeal)
component_docker_rootless=yes # user dockerd, rootful disabled. no to use rootful
component_dictation=yes       # speak-to-type — offline voice dictation, nerd-dictation + vosk (CPU; ~205MB model)
component_ocr=yes             # grab text off the screen — select region → OCR → clipboard (ocrscr: tesseract + capture deps)
component_mtga=no             # opt-in   MTG Arena under Wine; needs group_wine=yes (components/mtga.md)
# clipboard TTS (kokoro server + Flutter client) is ALWAYS installed — .configs
# ships the client unconditionally and it's useless without the backend venv.
# No flag; see profiles/workstation/07-components.sh (tts section).
group_dev_k8s=no              # minikube + future k8s tools (optional)
